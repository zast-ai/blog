stages:
  - verify
  - release

variables:
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: none

verify_release_candidate:
  stage: verify
  image: ruby:3.1
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git bash build-essential
    - rm -rf /var/lib/apt/lists/*
    - git config --global user.email "$GIT_AUTHOR_EMAIL"
    - git config --global user.name "$GIT_AUTHOR_NAME"
    - bundle config set path vendor/bundle
    - bundle install
  script:
    - bundle exec jekyll build

publish_to_github:
  stage: release
  image: ruby:3.1
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "api" && $CI_COMMIT_BRANCH == "dev"
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git bash curl jq
    - rm -rf /var/lib/apt/lists/*
    - git config --global user.email "$GIT_AUTHOR_EMAIL"
    - git config --global user.name "$GIT_AUTHOR_NAME"
  script:
    - chmod +x "${CI_PROJECT_DIR}/.gitlab/release.sh"
    - "${CI_PROJECT_DIR}/.gitlab/release.sh"
  resource_group: production
