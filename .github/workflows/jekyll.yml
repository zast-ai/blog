# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Build and deploy the latest release branch snapshot to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Deploy at 09:00 America/Los_Angeles.
  # GitHub Actions cron uses UTC, so we split DST/PST windows:
  # - PDT is 16:00 UTC
  # - PST is 17:00 UTC
  schedule:
    - cron: "0 16 * 3-10 *"
    - cron: "0 17 * 1,2,11,12 *"

  # Allows immediate deployment from the Actions tab or gh workflow run
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Git ref to deploy"
        required: false
        default: "release"
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref || 'release' }}
    steps:
      - name: Checkout release snapshot
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
